name: Release unoSignature

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    if: "${{ github.event_name != 'push' || !contains(github.event.head_commit.message, 'chore: release') }}"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prepare release version from changelog
        id: version
        run: |
          VERSION=$(python3 <<'PY'
          from __future__ import annotations

          import os
          import re
          import sys
          from pathlib import Path

          plugin_file = Path("unosignature.php")
          changelog_file = Path("CHANGELOG.md")

          def read_version(path: Path) -> str:
              text = path.read_text(encoding="utf-8")
              header_match = re.search(r"^ \* Version:\s*([0-9]+\.[0-9]+\.[0-9]+)\s*$", text, re.MULTILINE)
              const_match = re.search(r"define\('UNOSIGNATURE_VERSION',\s*'([0-9]+\.[0-9]+\.[0-9]+)'\);", text)
              if not header_match or not const_match:
                  raise RuntimeError("Could not find plugin header and UNOSIGNATURE_VERSION.")
              if header_match.group(1) != const_match.group(1):
                  raise RuntimeError("Plugin header version and UNOSIGNATURE_VERSION differ.")
              return header_match.group(1)

          def write_version(path: Path, version: str) -> None:
              text = path.read_text(encoding="utf-8")
              text = re.sub(
                  r"(^ \* Version:\s*)([0-9]+\.[0-9]+\.[0-9]+)(\s*$)",
                  rf"\g<1>{version}\g<3>",
                  text,
                  count=1,
                  flags=re.MULTILINE,
              )
              text = re.sub(
                  r"define\('UNOSIGNATURE_VERSION',\s*'[0-9]+\.[0-9]+\.[0-9]+'\);",
                  f"define('UNOSIGNATURE_VERSION', '{version}');",
                  text,
                  count=1,
              )
              path.write_text(text, encoding="utf-8")

          def read_changelog_version(path: Path) -> str | None:
              text = path.read_text(encoding="utf-8")
              match = re.search(r"(?m)^##\s+([0-9]+\.[0-9]+\.[0-9]+)\s*$", text)
              return match.group(1) if match else None

          def version_tuple(version: str) -> tuple[int, int, int]:
              parts = version.split(".")
              if len(parts) != 3 or not all(part.isdigit() for part in parts):
                  raise ValueError(f"Unsupported version format: {version}")
              return int(parts[0]), int(parts[1]), int(parts[2])

          current_version = read_version(plugin_file)
          changelog_version = read_changelog_version(changelog_file)
          if changelog_version is None:
              print("skip")
              sys.exit(0)

          if version_tuple(changelog_version) <= version_tuple(current_version):
              print("skip")
              sys.exit(0)

          write_version(plugin_file, changelog_version)
          print(changelog_version)
          PY
          )
          if [ "$VERSION" = "skip" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract release notes
        if: steps.version.outputs.skip != 'true'
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          python3 <<'PY' > release-notes.md
          from __future__ import annotations

          import os
          import re
          from pathlib import Path

          version = os.environ["RELEASE_VERSION"]
          changelog = Path("CHANGELOG.md")
          text = changelog.read_text(encoding="utf-8")
          pattern = rf"(?ms)^## {re.escape(version)}\s*\n(.*?)(?=^## |\Z)"
          match = re.search(pattern, text)
          if not match:
              raise SystemExit(f"Missing CHANGELOG section for version {version}.")
          print(match.group(1).strip())
          PY

      - name: Commit version bump
        if: steps.version.outputs.skip != 'true'
        run: |
          git add unosignature.php
          git commit -m "chore: release v${{ steps.version.outputs.version }} [skip ci]"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin HEAD:main
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Build plugin zip
        if: steps.version.outputs.skip != 'true'
        run: |
          rm -rf build unosignature.zip
          mkdir -p build/unosignature
          rsync -a \
            --exclude .git \
            --exclude build \
            --exclude .github \
            --exclude .DS_Store \
            ./ build/unosignature/
          cp CHANGELOG.md build/unosignature/CHANGELOG.md
          (cd build && zip -r ../unosignature.zip unosignature)

      - name: Create GitHub release
        if: steps.version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            unosignature.zip \
            --title "unoSignature v${{ steps.version.outputs.version }}" \
            --notes-file release-notes.md
