<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none" role="img" aria-label="unoSignature">
  <defs>
    <linearGradient id="bg" x1="40" y1="24" x2="216" y2="232" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3D50B4"/>
      <stop offset="1" stop-color="#232F73"/>
    </linearGradient>
    <linearGradient id="fold" x1="168" y1="44" x2="196" y2="72" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EEF1F8"/>
      <stop offset="1" stop-color="#C4CCE0"/>
    </linearGradient>
    <filter id="sheet" x="46" y="34" width="164" height="192" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#131B4A" flood-opacity="0.30"/>
    </filter>
  </defs>

  <rect width="256" height="256" rx="32" fill="url(#bg)"/>

  <!-- Contract sheet with folded corner -->
  <g filter="url(#sheet)">
    <path d="M60 44a8 8 0 0 1 8-8h100l24 24v128a8 8 0 0 1-8 8H68a8 8 0 0 1-8-8V44Z" fill="#FFFFFF"/>
    <path d="M168 36l24 24h-24V36Z" fill="url(#fold)"/>
  </g>

  <!-- Printed clauses -->
  <rect x="80" y="72" width="76" height="7" rx="3.5" fill="#DBE0EF"/>
  <rect x="80" y="90" width="96" height="7" rx="3.5" fill="#DBE0EF"/>
  <rect x="80" y="108" width="60" height="7" rx="3.5" fill="#DBE0EF"/>

  <!-- Signature: single flowing script stroke -->
  <path
    d="M78 158
       C74 140 92 128 98 142
       C104 156 88 168 86 150
       C84 132 108 128 116 146
       C122 159 112 168 110 152
       C108 138 130 134 140 148
       C146 156 154 156 168 146"
    stroke="#F4B740"
    stroke-width="7"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Signature baseline -->
  <path d="M74 176H150" stroke="#C7CEE4" stroke-width="4" stroke-linecap="round"/>

  <!-- Verified seal -->
  <circle cx="182" cy="184" r="30" fill="#2EA043"/>
  <circle cx="182" cy="184" r="30" stroke="#FFFFFF" stroke-width="5"/>
  <path
    d="M168 184l10 10 20-24"
    stroke="#FFFFFF"
    stroke-width="7"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
